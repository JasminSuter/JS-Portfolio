<style>

        @font-face {
    font-family: 'Handwritten-Regular';
    src: url('./static/fonts/Handwritten-Regular.woff');
    font-weight: normal;
    font-style: normal;

}

    body {
        background-color: #CF9168 ;
    }

    .full_box{
        width: 90%;
        margin: auto;
    }

            /* For width 1000px and bigger: */
    @media only screen and (min-width: 2000px) {
        .full_box {
            width: 70%;
            margin: auto;
        }
    }

    .arrowback{
        height: 10vh;
        z-index: 3;
        position: fixed;
        top: 10px;
        left: 10px;
    }

    .column {
        float: right;
        width: 20%;
        padding: 0px;
    }

    
    .column2 {
        float: right;
        width: 50%;
        padding: 0px;
    }

    /* Clear floats after image containers */
    .row::after {
        content: "";
        clear: both;
        display: table;
    }

    .box {
        position: sticky;
        top: -20px;
        width: 60%;
        left: 80%;
    }

            /* For width 1000px and bigger: */
    @media only screen and (max-width: 800px) {
        .box {
            width: 90%;
        }
    }

        /* For width 1000px and bigger: */
    @media only screen and (min-width: 1200px) {
        .box {
            width: 40%;
        }
    }

        /* For width 2000px and bigger: */
    @media only screen and (min-width: 2600px) {
        .box {
            width: 20%;
        }
    }

    .tab{
        height: 8%;
    }

    .project{
        font-size: 100px;
        font-family: 'Handwritten-Regular', sans-serif;
        color: #53321d;
        background-color: #e0a076;
        margin: 2%;
        padding: 2%;
        border-radius: 25px;
    }
    h1 {
        font-family: 'Handwritten-Regular';
        font-size: 50px;
        margin-left: 1%;
    }

    h2 {
        font-family: 'Handwritten-Regular';
        font-size: 40px;
        margin-left: 2%;
    }

    p {
        font-family: 'Handwritten-Regular';
        font-size: 20px;
        margin-left: 5%;
    }

    .container1 {
        display: grid;
        align-items: center; 
        grid-template-columns: 2fr 1fr;
        column-gap: 50px;
        margin: 50px;
    }
    
    .container2 {
        display: grid;
        align-items: center; 
        grid-template-columns: 1fr 2fr;
        column-gap: 50px;
        margin: 50px;
    }

    /* For width 800px and smaller: */
    @media only screen and (max-width: 800px) {
        .container1 {
            grid-template-columns: 1fr;
        }
       
        .container2 {
            grid-template-columns: 1fr;
        }

    }

    .art{
        max-width: 80%;
        height: auto;
        box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        margin: 5%;
        margin-bottom: -5%;
    }

    .art2{
        max-width: 80%;
        height: auto;
        margin: 5%;
        margin-bottom: -5%;
    }


    .assets{
        max-width: 80%;
        height: auto;
        margin: 5%;
        margin-bottom: -5%;
    }

    .final{
        max-width: 80%;
        height: auto;
        margin: 5%;
        margin-bottom: 5%;
    }

    .line{
        margin-left: 5%;
        margin-right: 5%;
        content: "";
        width: 80%;
        height: 3px;
        background: linear-gradient(to right, transparent, #53321d, transparent);
        border: none;
    }

    /* Positions the navigation control buttons at the top of the page */ 
  .navigation {
        position: fixed;
        right: 0;
        top: 0;
        left: 0;
        text-align: center;
        margin-top: -30px;
  }
  
  /* formats the navigation buttons in a horizontal line instead of vertical */ 
  .navigation-list,
  .navigation-item {
        display: inline-block;
  }
  
  /* styling for navigation buttons at the bottom*/
  .navigation-button {
        display: inline-block;
        border-radius: 0px 0px 20px 20px;
        color: #271910;
        font-family: 'Handwritten-Regular';
        width: 8rem;
        height: 2rem;
        background-color: #d49d7b;
        background-clip: content-box;
        border: 0.25rem solid  #271910;
        font-size: 25px;
        transition: transform 0.1s;
        margin: 10px;
        text-decoration: none
  }

  .back {
        position: fixed;
        right: 20px;
        top: 20px;
  }
  
  .arrow {
        width: 7rem;
        height: 7rem;
  }

       
</style>
